<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>QA Analyzer — 계층형 검증 모델</title>
<style>
:root{
  --bg:#eef1f7; --card:#ffffff; --rail:#141b2e; --rail-hi:#5b8cff;
  --line:#e3e8f2; --txt:#1f2738; --dim:#7b8798; --muted:#9aa5b6;
  --accent:#4f6ef7; --accent-w:#eaefff;
  --ok:#22b573; --ok-bg:#e7f8f0; --warn:#f0a92c; --warn-bg:#fdf3e2;
  --fail:#ef4b5d; --fail-bg:#fdeaec; --idle:#9aa5b6; --idle-bg:#eef1f6;
  --chip:#eef2fa;
}
@media (prefers-color-scheme: dark){
  :root{--bg:#0e1320;--card:#161d2e;--line:#28324a;--txt:#e6ecf7;--dim:#93a1bd;
  --muted:#6b7896;--accent:#5b8cff;--accent-w:#1b2540;--chip:#20293e;
  --ok-bg:#12301f;--warn-bg:#332614;--fail-bg:#331a1e;--idle-bg:#1c2436;}
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--txt);font-size:13px;line-height:1.45;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}
.app{display:grid;grid-template-columns:64px 320px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
/* top bar */
.top{grid-column:1/4;display:flex;align-items:center;gap:14px;background:var(--card);
  border-bottom:1px solid var(--line);padding:0 18px}
.top .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
.top .brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;
  display:grid;place-items:center;font-size:14px}
.top .crumb{color:var(--dim);font-weight:600}
.top .spacer{flex:1}
.pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
  border-radius:9px;padding:6px 11px;color:var(--dim);font-size:12px;white-space:nowrap}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5b8cff,#7c5cff);
  color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
/* rail */
.rail{grid-row:2/3;background:var(--rail);display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:14px 0;color:#8a97b4}
.rail a{width:44px;height:46px;border-radius:11px;display:grid;place-items:center;color:#8a97b4;
  text-decoration:none;font-size:17px;position:relative}
.rail a .lb{font-size:9px;margin-top:2px}
.rail a.on{background:#243155;color:#fff}
.rail a:hover{color:#fff}
.rail a i{font-style:normal;display:flex;flex-direction:column;align-items:center;line-height:1}
/* panels */
.pane{grid-row:2/3;background:var(--card);border-right:1px solid var(--line);overflow-y:auto}
.pane.tree{padding:14px 12px}
.selbox{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;color:var(--txt);font-weight:600;margin-bottom:9px}
.search{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;color:var(--txt);margin-bottom:12px;font-size:12px}
.tnode{border-radius:8px}
.trow{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:12.5px}
.trow:hover{background:var(--bg)}
.trow.sel{background:var(--accent-w);color:var(--accent);font-weight:700}
.trow .caret{width:12px;color:var(--muted);transition:transform .15s;flex:none}
.trow.open>.caret{transform:rotate(90deg)}
.trow .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow .cnt{color:var(--muted);font-size:11px;font-weight:600}
.tchildren{display:none;margin-left:12px;border-left:1px solid var(--line);padding-left:4px}
.tnode.open>.tchildren{display:block}
.dot{width:7px;height:7px;border-radius:50%;background:var(--idle);flex:none}
/* middle: function summary */
.mid{padding:0}
.mid .mhead{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);
  padding:14px 16px;z-index:2}
.mid .mtitle{display:flex;align-items:center;gap:10px}
.mid .micon{width:34px;height:34px;border-radius:9px;background:var(--accent-w);display:grid;place-items:center;font-size:17px}
.mid .mname{font-size:17px;font-weight:800}
.mid .mstat{color:var(--dim);font-size:11.5px;margin-top:3px}
.summary{padding:16px}
.sblock{margin-bottom:22px}
.sblock .st{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.02em;
  margin-bottom:11px;display:flex;justify-content:space-between;align-items:baseline}
.sblock .st span:last-child{font-weight:700;color:var(--dim)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
.kpi .kv{font-size:21px;font-weight:800;line-height:1}
.kpi .kv .ku{font-size:12px;font-weight:700;color:var(--muted);margin-left:1px}
.kpi .kl{color:var(--dim);font-size:10.5px;font-weight:700;margin-top:7px}
/* progress */
.prog{height:12px;border-radius:20px;background:var(--idle-bg);overflow:hidden;display:flex}
.prog i{display:block;height:100%}
.prog .p-ok{background:var(--ok)}.prog .p-fail{background:var(--fail)}
.leg{display:flex;gap:16px;margin-top:11px;flex-wrap:wrap}
.leg .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--dim)}
.leg .lg b{color:var(--txt);font-weight:800}
.leg .sw{width:9px;height:9px;border-radius:3px;flex:none}
/* bars */
.bar{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12px}
.bar .bl{width:104px;flex:none;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .bt{flex:1;height:8px;border-radius:20px;background:var(--idle-bg);overflow:hidden}
.bar .bt i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#7c5cff);border-radius:20px}
.bar .bv{width:30px;text-align:right;color:var(--muted);font-weight:700;font-size:11px;flex:none}
.gbar{cursor:pointer;border-radius:7px;padding:5px 6px;margin:0 -6px}
.gbar:hover{background:var(--bg)}
/* detail */
.detail{grid-row:2/3;overflow-y:auto;padding:0}
.dhead{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:16px 22px;z-index:2}
.dcrumb{color:var(--dim);font-size:12px;margin-bottom:8px}
.dcrumb b{color:var(--accent)}
.dtitle{display:flex;align-items:center;gap:12px}
.dtitle h2{font-size:19px;margin:0;font-weight:800}
.status-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--idle-bg);color:var(--idle)}
.dtitle .spacer{flex:1}
.btn{border:1px solid var(--line);background:var(--card);color:var(--dim);border-radius:9px;
  padding:7px 13px;font-size:12px;cursor:pointer;font-weight:600}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ddesc{color:var(--dim);font-size:12.5px;margin-top:8px}
.dbody{padding:18px 22px 60px}
.cplist{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:20px}
.cplist .lh{display:flex;padding:10px 14px;color:var(--muted);font-size:11px;font-weight:700;border-bottom:1px solid var(--line)}
.cplist .lh .n{width:26px}.cplist .lh .t{flex:1}.cplist .lh .r{width:70px;text-align:right}
.cprow{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
.cprow:last-child{border-bottom:none}
.cprow:hover{background:var(--bg)}
.cprow.sel{background:var(--accent-w)}
.cprow .num{width:26px;color:var(--muted);font-weight:700}
.cprow .txt{flex:1}
.cprow .res{width:70px;text-align:right}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;background:var(--idle-bg);color:var(--idle)}
.sectitle{font-size:14px;font-weight:800;margin:6px 0 12px;display:flex;align-items:center;gap:8px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.card .lab{color:var(--dim);font-size:11px;font-weight:700;margin-bottom:6px}
.card .val{font-size:13.5px;font-weight:600;word-break:break-word}
.card .val.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent);font-size:12.5px}
.cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.steps{list-style:none;margin:0;padding:0;counter-reset:s}
.steps li{counter-increment:s;display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:12.5px}
.steps li::before{content:counter(s);width:18px;height:18px;border-radius:50%;background:var(--accent-w);
  color:var(--accent);font-size:10px;font-weight:800;display:grid;place-items:center;flex:none;margin-top:1px}
.plist{list-style:none;margin:0;padding:0}
.plist li{position:relative;padding:3px 0 3px 14px;font-size:12.5px}
.plist li::before{content:"•";position:absolute;left:2px;color:var(--accent)}
.evrow{display:flex;gap:8px;flex-wrap:wrap}
.evchip{background:var(--chip);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:6px}
.note{background:var(--warn-bg);border:1px solid var(--line);border-radius:11px;padding:12px 15px;
  font-size:12px;color:var(--dim);margin-top:6px}
.note b{color:var(--txt)}
.hidden{display:none!important}
.stat-cluster{display:flex;gap:16px;align-items:center}
.sc{display:flex;flex-direction:column}
.sc .k{color:var(--muted);font-size:10.5px;font-weight:700}
.sc .v{font-size:16px;font-weight:800}
@media(max-width:1100px){.app{grid-template-columns:56px 1fr;grid-template-rows:56px auto auto}
  .pane.tree{grid-row:2/3;grid-column:2/3;max-height:42vh}
  .detail{grid-row:3/4;grid-column:1/3}
  .cards,.cards4{grid-template-columns:1fr 1fr}}
/* ===== Code Mapping (가상/TC 기반) ===== */
.cmap{border:1.5px dashed var(--accent);border-radius:14px;padding:16px 18px;margin:22px 0 20px;
  background:linear-gradient(180deg,var(--accent-w),transparent 60%)}
.cmap .cmhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.cmap .cmhead h3{font-size:15px;font-weight:800;margin:0}
.cmap .virt{font-size:10.5px;font-weight:800;color:var(--accent);background:var(--card);
  border:1px solid var(--accent);border-radius:20px;padding:2px 9px}
.cmap .cmwarn{color:var(--dim);font-size:11.5px;margin:2px 0 14px}
.cmap .cmwarn b{color:var(--accent)}
.mst{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.mst.suggested{background:var(--warn-bg);color:var(--warn)}
.mst.review{background:var(--fail-bg);color:var(--fail)}
.mst.confirmed{background:var(--ok-bg);color:var(--ok)}
.cmap .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.cfield{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.cfield .lab{color:var(--dim);font-size:10.5px;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between}
.cfield .val{font-size:13px;font-weight:600;word-break:break-word}
.cfield .val.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent);font-size:12px}
.cfield .sub{color:var(--muted);font-size:11px;font-weight:600;margin-top:2px}
.cfield.edited{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent-w)}
.edtag{font-size:9.5px;font-weight:800;color:var(--accent)}
/* confidence meter */
.confmeter{display:flex;align-items:center;gap:10px}
.confmeter .track{flex:1;height:7px;border-radius:20px;background:var(--idle-bg);overflow:hidden}
.confmeter .track i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),#7c5cff)}
.confmeter .pctv{font-size:14px;font-weight:800}
.cband{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px}
.cband.High{background:var(--ok-bg);color:var(--ok)}
.cband.Medium{background:var(--warn-bg);color:var(--warn)}
.cband.Low{background:var(--fail-bg);color:var(--fail)}
.cbasis{list-style:none;margin:6px 0 0;padding:0}
.cbasis li{position:relative;padding:3px 0 3px 16px;font-size:12px;color:var(--txt)}
.cbasis li::before{content:"›";position:absolute;left:2px;color:var(--accent);font-weight:800}
.cmact{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.cmact .btn{font-size:11.5px;padding:7px 12px}
/* virtual screen diagram */
.vscreen{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden;margin:12px 0 4px}
.vscreen .vhead{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 13px;background:var(--chip);border-bottom:1px solid var(--line)}
.vscreen .vhead .vn{font-weight:800;font-size:12.5px}
.vscreen .vhead .vid{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--accent)}
.vscreen .vhead .vflag{font-size:9.5px;font-weight:800;color:var(--muted);border:1px dashed var(--muted);border-radius:6px;padding:1px 6px}
.vregion{padding:9px 13px;border-bottom:1px dashed var(--line)}
.vregion:last-child{border-bottom:none}
.vregion .rl{font-size:9.5px;font-weight:800;color:var(--muted);margin-bottom:6px}
.vchips{display:flex;flex-wrap:wrap;gap:6px}
.vchip{font-family:ui-monospace,Menlo,monospace;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;
  background:var(--bg);border:1px solid var(--line);color:var(--dim)}
.vchip.cur{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,110,247,.4)}
.vmore{font-size:11px;color:var(--muted);align-self:center}
/* modal */
.cm-mask{position:fixed;inset:0;background:rgba(10,15,25,.5);display:none;z-index:50;align-items:center;justify-content:center}
.cm-mask.on{display:flex}
.cm-box{background:var(--card);border:1px solid var(--line);border-radius:14px;width:min(560px,92vw);
  max-height:82vh;overflow:auto;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.cm-box h3{margin:0 0 4px;font-size:16px;font-weight:800}
.cm-box .mdesc{color:var(--dim);font-size:12px;margin-bottom:16px}
.cm-box label{display:block;font-size:11px;font-weight:700;color:var(--dim);margin:11px 0 4px}
.cm-box input,.cm-box select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;color:var(--txt);font-size:13px;font-family:inherit}
.cm-box .mrow{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.rel-row{display:flex;gap:9px;align-items:center;padding:10px 11px;border:1px solid var(--line);border-radius:9px;
  margin-bottom:7px;cursor:pointer;font-size:12.5px}
.rel-row:hover{background:var(--bg);border-color:var(--accent)}
.rel-row .rp{color:var(--muted);font-size:10.5px;margin-top:2px}
.rel-row .rmst{margin-left:auto;flex:none}
</style>
</head>
<body>
<div class="app">
  <!-- top -->
  <div class="top">
    <div class="brand"><span class="logo">✓</span>QA Analyzer</div>
    <span class="crumb" id="crumb">일반채팅</span>
    <div class="spacer"></div>
    <span class="pill">v26.6.0 (6차)</span>
    <span class="pill">Android + iOS</span>
    <span class="pill">🔔</span>
    <div class="avatar">QA</div>
  </div>
  <!-- rail -->
  <nav class="rail">
    <a href="index.html" title="대시보드"><i>🏠<span class="lb">대시보드</span></i></a>
    <a class="on" title="검증 결과"><i>🧬<span class="lb">검증결과</span></i></a>
    <a title="기능/영역"><i>🗂<span class="lb">기능</span></i></a>
    <a title="리그레션"><i>🔁<span class="lb">리그레션</span></i></a>
    <a title="테스트 실행"><i>▶<span class="lb">실행</span></i></a>
    <a title="이슈"><i>⚑<span class="lb">이슈</span></i></a>
    <a title="리포트"><i>📊<span class="lb">리포트</span></i></a>
    <a title="설정"><i>⚙<span class="lb">설정</span></i></a>
  </nav>
  <!-- tree -->
  <aside class="pane tree">
    <div class="selbox">일반채팅 ▾</div>
    <input class="search" id="q" placeholder="기능 · 검증 항목 검색"/>
    <div id="tree"></div>
  </aside>
  <!-- detail -->
  <main class="detail">
    <div class="dhead">
      <div class="dcrumb" id="d-crumb">—</div>
      <div class="dtitle">
        <h2 id="d-title">검증 항목을 선택하세요</h2>
        <span class="status-chip" id="d-status">미실행</span>
        <div class="spacer"></div>
        <button class="btn" id="btn-issue">＋ 이슈 생성</button>
        <button class="btn primary" id="btn-run">▶ 테스트 실행</button>
      </div>
      <div class="ddesc" id="d-desc"></div>
    </div>
    <div class="dbody" id="d-body">
      <div class="note">좌측에서 서비스 → 기능 → 검증 그룹 → 검증 항목을 선택하면 체크포인트와 상세가 표시됩니다.</div>
    </div>
  </main>
</div>
<!-- 매핑 수정 / 관련 체크포인트 모달 -->
<div class="cm-mask" id="cm-mask"><div class="cm-box" id="cm-box"></div></div>
<script src="./code_mapping.js"></script>
<script>
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let M=null, CM=null, SEL={f:0,g:0,i:0,c:0};
/* 사용자 편집 오버레이 (localStorage) — 실제 코드 연동 시 이 레이어가 actual 로 대체됨 */
let SCREEN_OV={}, CP_OV={};
try{SCREEN_OV=JSON.parse(localStorage.getItem('qa_vmap_screen_ov')||'{}');}catch(e){}
try{CP_OV=JSON.parse(localStorage.getItem('qa_vmap_cp_ov')||'{}');}catch(e){}
function saveOV(){localStorage.setItem('qa_vmap_screen_ov',JSON.stringify(SCREEN_OV));
  localStorage.setItem('qa_vmap_cp_ov',JSON.stringify(CP_OV));}

function fnName(f){return f.function_name||f.function;}
function itemCP(it){return (it.checkpoints||[]).length;}
function groupCP(g){return (g.items||[]).reduce((a,i)=>a+itemCP(i),0);}

/* ---------- TREE ---------- */
function buildTree(){
  const t=document.getElementById('tree');
  t.innerHTML=M.functions.map((f,fi)=>{
    const groups=(f.validation_groups||[]).map((g,gi)=>{
      const items=(g.items||[]).map((it,ii)=>
        `<div class="trow item" data-f="${fi}" data-g="${gi}" data-i="${ii}">
           <span class="caret" style="visibility:hidden">▸</span><span class="dot"></span>
           <span class="nm">${esc(it.item)}</span><span class="cnt">${itemCP(it)}</span></div>`).join('');
      return `<div class="tnode">
        <div class="trow gtoggle" data-f="${fi}" data-g="${gi}"><span class="caret">▸</span><span class="nm">${esc(g.group)}</span><span class="cnt">${groupCP(g)}</span></div>
        <div class="tchildren">${items}</div></div>`;
    }).join('');
    return `<div class="tnode ${fi===SEL.f?'open':''}">
      <div class="trow ftoggle" data-f="${fi}"><span class="caret">▸</span>
        <span class="nm" style="font-weight:700">${esc(fnName(f))}</span><span class="cnt">${f.stats.checkpoints}</span></div>
      <div class="tchildren">${groups}</div></div>`;
  }).join('');
  // toggles
  t.querySelectorAll('.ftoggle').forEach(el=>el.onclick=e=>{
    el.parentNode.classList.toggle('open');el.classList.toggle('open');
    selectFunction(+el.dataset.f);});
  t.querySelectorAll('.gtoggle').forEach(el=>el.onclick=()=>{
    el.parentNode.classList.toggle('open');el.classList.toggle('open');});
  t.querySelectorAll('.trow.item').forEach(el=>el.onclick=()=>
    selectItem(+el.dataset.f,+el.dataset.g,+el.dataset.i));
}

/* ---------- FUNCTION OVERVIEW (right pane) ---------- */
function cpStatus(c){return c.result||c.status||'idle';}  // 실행 결과 연동 대비
function selectFunction(fi){
  SEL.f=fi; SEL.g=-1; SEL.i=-1;
  const f=M.functions[fi];
  document.getElementById('crumb').textContent='일반채팅  ›  '+fnName(f);
  document.getElementById('d-crumb').textContent='일반채팅  ›  '+fnName(f);
  document.getElementById('d-title').textContent=fnName(f);
  document.getElementById('d-status').textContent='개요';
  document.getElementById('d-desc').textContent=
    `검증 그룹 ${f.stats.groups} · 검증 항목 ${f.stats.items} · 체크포인트 ${f.stats.checkpoints}`;
  renderOverview(fi);
  markSel();
}
function pct(n,d){return d?Math.round(n/d*100):0;}
function renderOverview(fi){
  const f=M.functions[fi], groups=f.validation_groups||[];
  let cps=[]; groups.forEach(g=>(g.items||[]).forEach(i=>cps=cps.concat(i.checkpoints||[])));
  const total=cps.length;
  // 실행 현황
  let ok=0,fail=0;
  cps.forEach(c=>{const s=cpStatus(c); if(s==='pass'||s==='ok')ok++; else if(s==='fail')fail++;});
  const idle=total-ok-fail, done=ok+fail;
  // 증거 유형 분포
  const ev={}; cps.forEach(c=>(c.evidence||[]).forEach(e=>ev[e]=(ev[e]||0)+1));
  const evMax=Math.max(1,...Object.values(ev));
  const evRows=Object.entries(ev).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="bar"><span class="bl">${evIcon(k)} ${esc(k)}</span>
      <span class="bt"><i style="width:${pct(v,evMax)}%"></i></span><span class="bv">${v}</span></div>`).join('')||'<div class="bar"><span class="bl">-</span></div>';
  // 그룹별 체크포인트
  const gMax=Math.max(1,...groups.map(g=>groupCP(g)));
  const gRows=groups.map((g,gi)=>
    `<div class="bar gbar" data-g="${gi}"><span class="bl" title="${esc(g.group)}">${esc(g.group)}</span>
      <span class="bt"><i style="width:${pct(groupCP(g),gMax)}%"></i></span><span class="bv">${groupCP(g)}</span></div>`).join('');
  // 핵심 지표
  const items=groups.reduce((a,g)=>a+(g.items||[]).length,0);
  const avg=items?(total/items).toFixed(1):'0';
  const pcCov=pct(cps.filter(c=>(c.preconditions||[]).length).length,total);
  document.getElementById('d-body').innerHTML=`
    <div class="sblock">
      <div class="st"><span>실행 현황</span><span>${pct(done,total)}% 완료</span></div>
      <div class="prog"><i class="p-ok" style="width:${pct(ok,total)}%"></i><i class="p-fail" style="width:${pct(fail,total)}%"></i></div>
      <div class="leg">
        <span class="lg"><span class="sw" style="background:var(--ok)"></span>통과 <b>${ok}</b></span>
        <span class="lg"><span class="sw" style="background:var(--fail)"></span>실패 <b>${fail}</b></span>
        <span class="lg"><span class="sw" style="background:var(--idle)"></span>미실행 <b>${idle}</b></span>
      </div>
    </div>
    <div class="sblock">
      <div class="st"><span>핵심 지표</span></div>
      <div class="kpis">
        <div class="kpi"><div class="kv">${avg}</div><div class="kl">항목당 평균 CP</div></div>
        <div class="kpi"><div class="kv">${pcCov}<span class="ku">%</span></div><div class="kl">사전조건 정의율</div></div>
        <div class="kpi"><div class="kv">${Object.keys(ev).length}</div><div class="kl">증거 유형 수</div></div>
      </div>
    </div>
    <div class="sblock">
      <div class="st"><span>검증 그룹별 체크포인트</span><span>${groups.length}개 그룹</span></div>
      ${gRows}
    </div>
    <div class="sblock">
      <div class="st"><span>증거(Evidence) 유형 분포</span><span>총 ${total} CP</span></div>
      ${evRows}
    </div>`;
  document.querySelectorAll('#d-body .gbar').forEach(el=>el.onclick=()=>openGroupInTree(fi,+el.dataset.g));
}
function openGroupInTree(fi,gi){
  const tree=document.getElementById('tree'), fnode=tree.children[fi];
  if(fnode&&!fnode.classList.contains('open')){
    fnode.classList.add('open'); const ft=fnode.querySelector('.ftoggle'); if(ft)ft.classList.add('open');}
  const gt=tree.querySelector(`.gtoggle[data-f="${fi}"][data-g="${gi}"]`);
  if(gt){gt.parentNode.classList.add('open');gt.classList.add('open');
    gt.scrollIntoView({block:'center',behavior:'smooth'});}
}

/* ---------- DETAIL ---------- */
function selectItem(fi,gi,ii){
  SEL.f=fi;SEL.g=gi;SEL.i=ii;SEL.c=0;
  const f=M.functions[fi], g=f.validation_groups[gi], it=g.items[ii];
  document.getElementById('crumb').textContent='일반채팅  ›  '+fnName(f);
  document.getElementById('d-crumb').innerHTML=
    `${esc(fnName(f))} › <b>${esc(g.group)}</b> › ${esc(it.item)}`;
  document.getElementById('d-title').textContent=it.item;
  document.getElementById('d-status').textContent='미실행';
  document.getElementById('d-desc').textContent=`이 검증 항목은 ${itemCP(it)}개의 체크포인트로 세분화되어 있습니다.`;
  renderCheckpoints(it);
  markSel();
}
function renderCheckpoints(it){
  const cps=it.checkpoints||[];
  const rows=cps.map((c,ci)=>
    `<div class="cprow ${ci===SEL.c?'sel':''}" data-c="${ci}">
      <span class="num">${ci+1}</span><span class="txt">${esc(c.check_point)}</span>
      <span class="res"><span class="tag">◌ 미실행</span></span></div>`).join('');
  const body=document.getElementById('d-body');
  body.innerHTML=
    `<div class="cplist"><div class="lh"><span class="n">#</span><span class="t">체크포인트 (${cps.length})</span><span class="r">결과</span></div>${rows}</div>
     <div id="cp-detail"></div>`;
  body.querySelectorAll('.cprow').forEach(el=>el.onclick=()=>{SEL.c=+el.dataset.c;
    body.querySelectorAll('.cprow').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');renderCPDetail(it);});
  renderCPDetail(it);
}
function renderCPDetail(it){
  const c=(it.checkpoints||[])[SEL.c]; if(!c){document.getElementById('cp-detail').innerHTML='';return;}
  const ep=(c.execution_path||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li>-</li>';
  const pc=(c.preconditions||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li>-</li>';
  const ev=(c.evidence||[]).map(e=>`<span class="evchip">${evIcon(e)} ${esc(e)}</span>`).join('')||'-';
  document.getElementById('cp-detail').innerHTML=
   `<div class="sectitle">체크포인트 상세 <span class="tag">◌ 미실행</span></div>
    <div class="cards">
      <div class="card"><div class="lab">체크 내용 (Check Point)</div><div class="val">${esc(c.check_point)}</div></div>
      <div class="card"><div class="lab">대상 (Target)</div><div class="val mono">${esc(c.target||'-')}</div></div>
      <div class="card"><div class="lab">기대 상태 (Expected State)</div><div class="val mono">${esc(c.expected_state||'-')}</div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="lab">실행 경로 (Execution Path)</div><ol class="steps">${ep}</ol></div>
      <div class="card"><div class="lab">사전조건 (Preconditions)</div><ul class="plist">${pc}</ul></div>
      <div class="card"><div class="lab">증거 (Evidence)</div><div class="evrow">${ev}</div></div>
    </div>
    <div class="note"><b>실행 결과 (Result): 미실행</b> — 이 검증 모델은 구조 설계 데이터입니다.
      테스트 실행 결과(통과/실패·Tester·Device·스크린샷)를 연동하면 각 체크포인트의 통과율과 상태가 자동 반영됩니다.</div>
    <div id="cmap-slot"></div>`;
  renderCodeMapping();
}
function evIcon(e){const m={Screenshot:'🖼',OCR:'🔤',ComponentTree:'🌳',APIResponse:'🔌',DB:'🗄',Log:'📜',Accessibility:'♿',Video:'🎬'};return m[e]||'📎';}

/* ================= CODE MAPPING (가상 / TC 기반) ================= */
const MST={virtual_confirmed:{cls:'confirmed',lb:'확정됨'},virtual_suggested:{cls:'suggested',lb:'가상 매핑(추정)'},
  review_required:{cls:'review',lb:'검수 필요'},unmapped:{cls:'review',lb:'미매핑'}};
const REGION_LB={top:'상단 영역',body:'본문 영역',input:'입력 영역',overlay:'오버레이(팝업·시트)'};
/* 생성 매핑 + 사용자 오버레이(화면/체크포인트) 병합 → 최종 표시값 */
function resolveMapping(cpId){
  if(!CM||!CM.checkpoints[cpId])return null;
  const base=CM.checkpoints[cpId], sc=SCREEN_OV[base.screen_id]||{}, cp=CP_OV[cpId]||{};
  const reg=CM.screens[base.screen_id]||{};
  const status=cp.mapping_status||sc.mapping_status||base.mapping_status;
  const edited=!!(sc.screen_name||sc.screen_id_alias||sc.activity_candidate||sc.fragment_candidate||cp.mapping_status||sc.mapping_status);
  return Object.assign({},base,{
    screen_name:sc.screen_name||reg.screen_name,
    screen_id_disp:sc.screen_id_alias||base.screen_id,
    activity_candidate:sc.activity_candidate||base.activity_candidate,
    fragment_candidate:sc.fragment_candidate||base.fragment_candidate,
    mapping_status:status, edited:edited, _origScreen:base.screen_id});
}
function renderCodeMapping(){
  const slot=document.getElementById('cmap-slot'); if(!slot)return;
  if(!CM){slot.innerHTML='';return;}
  const cpId=CodeMapping.cpId(SEL.f,SEL.g,SEL.i,SEL.c), mp=resolveMapping(cpId);
  if(!mp){slot.innerHTML='';return;}
  const st=MST[mp.mapping_status]||MST.review, pctv=Math.round(mp.confidence*100);
  const ed=f=>mp.edited&&(SCREEN_OV[mp._origScreen]||{})[f]?'<span class="edtag"> ✎수정됨</span>':'';
  const basis=(mp.mapping_basis||[]).map(b=>`<li>${esc(b)}</li>`).join('');
  const overlay=mp.overlay_candidate?`<div class="cfield"><div class="lab">Overlay Candidate</div><div class="val mono">${esc(mp.overlay_candidate)}</div></div>`:'';
  slot.innerHTML=`
   <div class="cmap">
     <div class="cmhead"><h3>Code Mapping</h3><span class="virt">가상 · TC 기반</span>
       <span class="spacer" style="flex:1"></span><span class="mst ${st.cls}">${st.lb}</span></div>
     <div class="cmwarn">⚠ 실제 Android 소스코드가 연결되지 않아 <b>TC 문서에서 추론한 가상 구조</b>입니다.
       Activity·Fragment·ID는 확정값이 아니며, 실제 코드 연동 시 교체됩니다.</div>
     <div class="grid2">
       <div class="cfield${(SCREEN_OV[mp._origScreen]||{}).screen_name?' edited':''}"><div class="lab">Screen Name${ed('screen_name')}</div>
         <div class="val">${esc(mp.screen_name)}</div><div class="sub mono">${esc(mp.screen_id_disp)}</div></div>
       <div class="cfield"><div class="lab">Target</div>
         <div class="val mono">${esc(mp.target_name||'-')}</div><div class="sub mono">${esc(mp.target_id||'미지정')}</div></div>
     </div>
     <div class="cfield" style="margin-bottom:10px"><div class="lab">가상 Android 구조 (Virtual Structure)</div>
       <div class="grid2" style="margin:6px 0 0">
         <div><div class="sub">Activity 후보${ed('activity_candidate')}</div><div class="val mono">${esc(mp.activity_candidate)}</div></div>
         <div><div class="sub">Fragment 후보${ed('fragment_candidate')}</div><div class="val mono">${esc(mp.fragment_candidate)}</div></div>
         <div><div class="sub">Route 후보</div><div class="val mono">${esc(mp.route_candidate||'-')}</div></div>
         <div><div class="sub">Overlay 후보</div><div class="val mono">${esc(mp.overlay_candidate||'없음')}</div></div>
       </div></div>
     <div class="grid2">
       <div class="cfield"><div class="lab">Expected State (정규화)</div><div class="val mono">${esc(mp.expected_state||'-')}</div></div>
       <div class="cfield"><div class="lab">Mapping Confidence</div>
         <div class="confmeter"><span class="pctv">${pctv}%</span><span class="track"><i style="width:${pctv}%"></i></span>
           <span class="cband ${mp.confidence_band}">${mp.confidence_band}</span></div></div>
     </div>
     <div class="cfield"><div class="lab">Mapping Basis (추론 근거)</div><ul class="cbasis">${basis}</ul></div>
     ${renderVScreen(mp._origScreen,mp.target_name)}
     <div class="cmact">
       <button class="btn" id="cm-edit">✎ 매핑 수정</button>
       <button class="btn ${mp.mapping_status==='virtual_confirmed'?'':'primary'}" id="cm-confirm">${mp.mapping_status==='virtual_confirmed'?'↺ 확정 해제':'✓ 매핑 확정'}</button>
       <button class="btn" id="cm-scr">🗂 동일 화면 체크포인트 (${(CM.byScreen[mp._origScreen]||[]).length})</button>
       ${mp.target_id?`<button class="btn" id="cm-tgt">🎯 동일 Target 체크포인트 (${(CM.byTarget[mp.target_id]||[]).length})</button>`:''}
     </div>
   </div>`;
  slot.querySelector('#cm-edit').onclick=()=>openEditModal(cpId);
  slot.querySelector('#cm-confirm').onclick=()=>toggleConfirm(cpId);
  slot.querySelector('#cm-scr').onclick=()=>openRelated('screen',mp._origScreen,'동일 화면: '+mp.screen_name);
  const tg=slot.querySelector('#cm-tgt'); if(tg)tg.onclick=()=>openRelated('target',mp.target_id,'동일 Target: '+mp.target_name);
}
/* TC 기반 가상 화면 구조도 (실제 스크린샷 아님) */
function renderVScreen(screenId,curTarget){
  const s=CM.screens[screenId]; if(!s)return '';
  const buckets={top:[],body:[],input:[],overlay:[]};
  (s.targets||[]).forEach(t=>buckets[CodeMapping.region(t)].push(t));
  const CAP=10;
  const order=['top','body','input','overlay'];
  const regions=order.filter(r=>buckets[r].length||r==='body'&&false).map(r=>{
    let list=buckets[r];
    if(!list.length)return '';
    const hasCur=list.indexOf(curTarget)>=0;
    let show=list.slice(0,CAP);
    if(hasCur&&show.indexOf(curTarget)<0){show=show.slice(0,CAP-1);show.push(curTarget);}
    const more=list.length-show.length;
    const chips=show.map(t=>`<span class="vchip${t===curTarget?' cur':''}">${esc(t)}</span>`).join('')
      +(more>0?`<span class="vmore">+${more}</span>`:'');
    return `<div class="vregion"><div class="rl">${REGION_LB[r]}</div><div class="vchips">${chips}</div></div>`;
  }).join('');
  return `<div class="vscreen">
    <div class="vhead"><span><span class="vn">${esc(s.screen_name)}</span> <span class="vid">${esc(s.screen_id)}</span></span>
      <span class="vflag">TC 기반 가상 화면</span></div>${regions}</div>`;
}
/* 매핑 수정 모달 (화면 단위 편집 → 동일 화면 CP 일괄 반영) */
function openEditModal(cpId){
  const mp=resolveMapping(cpId), box=document.getElementById('cm-box');
  box.innerHTML=`<h3>매핑 수정</h3>
    <div class="mdesc">화면 단위 값입니다. 저장하면 <b>동일 화면(${esc(mp.screen_id_disp)})을 공유하는 모든 체크포인트</b>에 일관 반영됩니다.</div>
    <label>Screen Name</label><input id="e-sn" value="${esc(mp.screen_name)}"/>
    <label>Screen ID</label><input id="e-sid" value="${esc(mp.screen_id_disp)}"/>
    <label>Activity 후보</label><input id="e-act" value="${esc(mp.activity_candidate)}"/>
    <label>Fragment 후보</label><input id="e-frg" value="${esc(mp.fragment_candidate)}"/>
    <div class="mrow"><button class="btn" id="e-cancel">취소</button>
      <button class="btn" id="e-reset">기본값 복원</button>
      <button class="btn primary" id="e-save">저장</button></div>`;
  showMask(true);
  box.querySelector('#e-cancel').onclick=()=>showMask(false);
  box.querySelector('#e-reset').onclick=()=>{delete SCREEN_OV[mp._origScreen];saveOV();showMask(false);renderCodeMapping();};
  box.querySelector('#e-save').onclick=()=>{
    SCREEN_OV[mp._origScreen]={screen_name:box.querySelector('#e-sn').value.trim(),
      screen_id_alias:box.querySelector('#e-sid').value.trim(),
      activity_candidate:box.querySelector('#e-act').value.trim(),
      fragment_candidate:box.querySelector('#e-frg').value.trim(),
      mapping_status:(SCREEN_OV[mp._origScreen]||{}).mapping_status};
    saveOV();showMask(false);renderCodeMapping();};
}
function toggleConfirm(cpId){
  const cur=(CP_OV[cpId]||{}).mapping_status;
  if(cur==='virtual_confirmed'){delete CP_OV[cpId];}
  else{CP_OV[cpId]={mapping_status:'virtual_confirmed'};}
  saveOV();renderCodeMapping();
}
/* 동일 화면 / 동일 Target 체크포인트 목록 */
function openRelated(kind,id,title){
  const list=(kind==='screen'?CM.byScreen[id]:CM.byTarget[id])||[], box=document.getElementById('cm-box');
  const rows=list.map(l=>{const mp=resolveMapping(l.cpId),st=MST[mp.mapping_status]||MST.review;
    const f=M.functions[l.fi],g=f.validation_groups[l.gi],it=g.items[l.ii];
    return `<div class="rel-row" data-f="${l.fi}" data-g="${l.gi}" data-i="${l.ii}" data-c="${l.ci}">
      <div><div>${esc(l.label)}</div><div class="rp">${esc(fnName(f))} › ${esc(g.group)} › ${esc(it.item)}</div></div>
      <span class="mst ${st.cls} rmst">${st.lb}</span></div>`;}).join('');
  box.innerHTML=`<h3>${esc(title)}</h3><div class="mdesc">${list.length}개 체크포인트가 이 매핑을 공유합니다. 클릭하면 이동합니다.</div>
    ${rows||'<div class="mdesc">없음</div>'}<div class="mrow"><button class="btn" id="r-close">닫기</button></div>`;
  showMask(true);
  box.querySelector('#r-close').onclick=()=>showMask(false);
  box.querySelectorAll('.rel-row').forEach(el=>el.onclick=()=>{
    showMask(false);
    selectItem(+el.dataset.f,+el.dataset.g,+el.dataset.i);
    SEL.c=+el.dataset.c;
    const rows=document.querySelectorAll('#d-body .cprow');
    if(rows[SEL.c]){rows.forEach(r=>r.classList.remove('sel'));rows[SEL.c].classList.add('sel');
      rows[SEL.c].scrollIntoView({block:'nearest'});}
    renderCPDetail(M.functions[SEL.f].validation_groups[SEL.g].items[SEL.i]);});
}
function showMask(on){const m=document.getElementById('cm-mask');m.classList.toggle('on',on);}
document.getElementById('cm-mask').addEventListener('click',e=>{if(e.target.id==='cm-mask')showMask(false);});

function markSel(){
  document.querySelectorAll('#tree .trow.item').forEach(el=>{
    el.classList.toggle('sel', +el.dataset.f===SEL.f&&+el.dataset.g===SEL.g&&+el.dataset.i===SEL.i);});
  document.querySelectorAll('#tree .ftoggle').forEach(el=>{
    el.classList.toggle('sel', SEL.i<0 && +el.dataset.f===SEL.f);});
}

/* ---------- SEARCH ---------- */
document.getElementById('q').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('#tree .tnode').forEach(n=>{
    const txt=n.textContent.toLowerCase();
    n.style.display=(!q||txt.includes(q))?'':'none';
    if(q&&txt.includes(q))n.classList.add('open');
  });
});

fetch('./validation_model.json').then(r=>r.json()).then(m=>{
  M=m;
  try{CM=(window.CodeMapping&&window.CodeMapping.build)?window.CodeMapping.build(M):null;}
  catch(e){console.error('CodeMapping build 실패',e);CM=null;}
  buildTree(); selectFunction(0);
}).catch(()=>{document.getElementById('d-body').innerHTML='<div class="note">validation_model.json 을 불러오지 못했습니다.</div>';});
</script>
